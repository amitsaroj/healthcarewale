<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>HealthcareWale - Live Queue Tracker</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "secondary-fixed": "#d2e4fb",
                        "on-secondary-container": "#556679",
                        "outline-variant": "#bdc9c8",
                        "on-tertiary-container": "#e9ffe9",
                        "on-secondary-fixed": "#0b1d2d",
                        "secondary-container": "#d2e4fb",
                        "tertiary-fixed": "#6bfe9c",
                        "error-container": "#ffdad6",
                        "tertiary-container": "#008443",
                        "on-secondary": "#ffffff",
                        "surface-container-high": "#dce9ff",
                        "on-tertiary-fixed-variant": "#005228",
                        "surface-bright": "#f8f9ff",
                        "surface-container-highest": "#d3e4fe",
                        "on-surface-variant": "#3e4949",
                        "on-primary": "#ffffff",
                        "primary-container": "#008080",
                        "surface-tint": "#006a6a",
                        "on-primary-fixed": "#002020",
                        "surface-dim": "#cbdbf5",
                        "on-background": "#0b1c30",
                        "surface-variant": "#d3e4fe",
                        "tertiary-fixed-dim": "#4ae183",
                        "background": "#f8f9ff",
                        "on-error-container": "#93000a",
                        "inverse-on-surface": "#eaf1ff",
                        "error": "#ba1a1a",
                        "primary-fixed": "#93f2f2",
                        "on-tertiary-fixed": "#00210c",
                        "on-error": "#ffffff",
                        "primary-fixed-dim": "#76d6d5",
                        "on-primary-fixed-variant": "#004f4f",
                        "surface-container-low": "#eff4ff",
                        "surface": "#f8f9ff",
                        "primary": "#006565",
                        "on-tertiary": "#ffffff",
                        "surface-container": "#e5eeff",
                        "secondary": "#4f6073",
                        "on-secondary-fixed-variant": "#38485a",
                        "inverse-primary": "#76d6d5",
                        "surface-container-lowest": "#ffffff",
                        "secondary-fixed-dim": "#b7c8de",
                        "on-primary-container": "#e3fffe",
                        "on-surface": "#0b1c30",
                        "inverse-surface": "#213145",
                        "tertiary": "#006834",
                        "outline": "#6e7979"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "margin-mobile": "16px",
                        "container-max": "1440px",
                        "gutter": "24px",
                        "unit": "8px",
                        "touch-target": "48px",
                        "margin-desktop": "40px"
                    },
                    "fontFamily": {
                        "headline-xl": ["Inter"],
                        "body-lg": ["Inter"],
                        "label-lg": ["Inter"],
                        "headline-md": ["Inter"],
                        "caption": ["Inter"],
                        "body-md": ["Inter"],
                        "label-md": ["Inter"],
                        "headline-lg": ["Inter"]
                    },
                    "fontSize": {
                        "headline-xl": ["40px", { "lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "label-lg": ["15px", { "lineHeight": "1.4", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "headline-md": ["24px", { "lineHeight": "1.3", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "caption": ["12px", { "lineHeight": "1.4", "fontWeight": "400" }],
                        "body-md": ["16px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "label-md": ["13px", { "lineHeight": "1.4", "fontWeight": "500" }],
                        "headline-lg": ["32px", { "lineHeight": "1.25", "letterSpacing": "-0.02em", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
<style>
        .pulse-ring {
            animation: pulse-ring 2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }
        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 0.5; }
            100% { transform: scale(2.5); opacity: 0; }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col selection:bg-primary-container selection:text-on-primary-container">
<!-- TopAppBar (Suppressed as this is a focused task/tracker screen, but keeping a simplified contextual header) -->
<header class="bg-surface sticky w-full top-0 z-40 border-b border-outline-variant shadow-sm flex items-center px-margin-mobile h-touch-target">
<button aria-label="Go Back" class="text-on-surface-variant hover:bg-surface-container-low transition-colors duration-200 rounded-full w-touch-target h-touch-target flex items-center justify-center -ml-unit">
<span class="material-symbols-outlined" data-weight="fill" style="font-variation-settings: 'FILL' 1;">arrow_back</span>
</button>
<div class="flex-1 flex flex-col justify-center ml-unit">
<h1 class="font-label-lg text-label-lg text-primary">Live Token Status</h1>
<p class="font-caption text-caption text-on-surface-variant">City Hospital - Dr. Sharma</p>
</div>
<button aria-label="Refresh" class="text-on-surface-variant hover:bg-surface-container-low transition-colors duration-200 rounded-full w-touch-target h-touch-target flex items-center justify-center">
<span class="material-symbols-outlined">refresh</span>
</button>
</header>
<!-- Main Canvas -->
<main class="flex-1 w-full max-w-container-max mx-auto p-margin-mobile md:p-margin-desktop flex flex-col gap-gutter pb-32">
<!-- Live Status Hero Card -->
<section class="bg-surface-container-lowest border border-outline-variant rounded-xl shadow-lg relative overflow-hidden">
<!-- Priority Border -->
<div class="absolute left-0 top-0 bottom-0 w-1 bg-tertiary"></div>
<div class="p-gutter flex flex-col md:flex-row items-center justify-between gap-gutter">
<!-- Current Serving -->
<div class="flex flex-col items-center flex-1 w-full text-center p-unit bg-surface-container rounded-lg relative">
<span class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider mb-2">Current Serving</span>
<div class="font-headline-xl text-headline-xl text-primary font-bold">A-42</div>
<div class="absolute top-2 right-2 flex items-center gap-1">
<span class="relative flex h-3 w-3">
<span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-tertiary opacity-75"></span>
<span class="relative inline-flex rounded-full h-3 w-3 bg-tertiary"></span>
</span>
</div>
</div>
<!-- Divider (Desktop) -->
<div class="hidden md:block w-px h-16 bg-outline-variant"></div>
<!-- Your Token -->
<div class="flex flex-col items-center flex-1 w-full text-center p-unit">
<span class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider mb-2">Your Token</span>
<div class="font-headline-xl text-headline-xl text-on-background font-extrabold bg-secondary-container px-6 py-2 rounded-xl">A-48</div>
</div>
</div>
</section>
<!-- Metrics Grid -->
<section class="grid grid-cols-2 md:grid-cols-4 gap-unit md:gap-gutter">
<!-- Est Wait Time -->
<div class="bg-surface-container-lowest border border-outline-variant rounded-lg p-unit md:p-margin-mobile flex flex-col justify-center items-center text-center relative overflow-hidden">
<span class="material-symbols-outlined text-secondary absolute -right-2 -bottom-2 text-6xl opacity-10">schedule</span>
<span class="font-label-md text-label-md text-on-surface-variant mb-1 z-10">Est. Wait Time</span>
<div class="font-headline-lg text-headline-lg text-on-background z-10">~25<span class="font-body-md text-body-md text-on-surface-variant ml-1">min</span></div>
</div>
<!-- Queue Position -->
<div class="bg-surface-container-lowest border border-outline-variant rounded-lg p-unit md:p-margin-mobile flex flex-col justify-center items-center text-center relative overflow-hidden">
<span class="material-symbols-outlined text-secondary absolute -right-2 -bottom-2 text-6xl opacity-10">group</span>
<span class="font-label-md text-label-md text-on-surface-variant mb-1 z-10">People Ahead</span>
<div class="font-headline-lg text-headline-lg text-on-background z-10">6</div>
</div>
<!-- Consultation Room -->
<div class="col-span-2 md:col-span-2 bg-surface-container-lowest border border-outline-variant rounded-lg p-unit md:p-margin-mobile flex flex-row items-center justify-between">
<div class="flex flex-col">
<span class="font-label-md text-label-md text-on-surface-variant">Consultation Room</span>
<span class="font-headline-md text-headline-md text-on-background">Room 104</span>
</div>
<div class="w-12 h-12 bg-surface-container-highest rounded-full flex items-center justify-center text-primary">
<span class="material-symbols-outlined" data-weight="fill" style="font-variation-settings: 'FILL' 1;">meeting_room</span>
</div>
</div>
</section>
<!-- Actions & Settings -->
<section class="flex flex-col gap-unit">
<div class="bg-surface-container-lowest border border-outline-variant rounded-lg shadow-sm">
<!-- WhatsApp Toggle -->
<div class="flex items-center justify-between p-margin-mobile border-b border-outline-variant">
<div class="flex items-center gap-margin-mobile">
<div class="w-10 h-10 bg-tertiary-container/10 rounded-full flex items-center justify-center text-tertiary">
<span class="material-symbols-outlined">mark_chat_unread</span>
</div>
<div class="flex flex-col">
<span class="font-label-lg text-label-lg text-on-background">Notify via WhatsApp</span>
<span class="font-caption text-caption text-on-surface-variant">Alert when 2 people ahead</span>
</div>
</div>
<!-- Toggle Switch -->
<label class="relative inline-flex items-center cursor-pointer min-w-[48px] h-touch-target justify-end">
<input checked="" class="sr-only peer" type="checkbox" value=""/>
<div class="w-11 h-6 bg-surface-variant peer-focus:outline-none peer-focus:ring-2 peer-focus:ring-primary rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[13px] after:left-[2px] after:bg-white after:border-outline after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
</label>
</div>
<!-- Call Clinic Action -->
<button class="w-full flex items-center p-margin-mobile hover:bg-surface-container-low transition-colors duration-200 text-left min-h-touch-target focus:outline-none focus:ring-2 focus:ring-inset focus:ring-primary rounded-b-lg group">
<div class="w-10 h-10 bg-surface-container rounded-full flex items-center justify-center text-on-surface-variant group-hover:text-primary transition-colors">
<span class="material-symbols-outlined">call</span>
</div>
<div class="flex-1 ml-margin-mobile">
<span class="font-label-lg text-label-lg text-on-background block">Call Clinic Front Desk</span>
<span class="font-caption text-caption text-on-surface-variant">For immediate assistance</span>
</div>
<span class="material-symbols-outlined text-outline-variant">chevron_right</span>
</button>
</div>
</section>
</main>
<!-- Contextual FAB (Optional: e.g., for canceling appointment if allowed, but usually suppressed on focused trackers. Included a simplified 'Refresh' orb if needed for voice/quick action) -->
<button aria-label="Quick Actions" class="fixed bottom-margin-mobile right-margin-mobile md:bottom-margin-desktop md:right-margin-desktop w-14 h-14 bg-primary text-on-primary rounded-full shadow-lg flex items-center justify-center hover:bg-surface-tint transition-transform duration-300 active:scale-95 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary z-50 group">
<div class="absolute inset-0 rounded-full border-2 border-primary pulse-ring"></div>
<span class="material-symbols-outlined" data-weight="fill" style="font-variation-settings: 'FILL' 1;">mic</span>
</button>
</body></html>
