<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        
        /* Glassmorphism Depth Layering */
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.12);
        }

        /* Biometric Pulsing Animation */
        @keyframes biometric-pulse {
            0%, 100% { transform: scale(1); opacity: 0.6; box-shadow: 0 0 20px 2px rgba(118, 214, 213, 0.2); }
            50% { transform: scale(1.08); opacity: 0.9; box-shadow: 0 0 40px 8px rgba(118, 214, 213, 0.4); }
        }

        /* Rotating Scanning Ring */
        @keyframes rotate-ring {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Scanning Line Sweep */
        @keyframes scan-sweep {
            0% { top: -10%; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 110%; opacity: 0; }
        }

        /* Floating Entrance Animation */
        @keyframes float-up {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Shimmer Button Effect */
        @keyframes button-shimmer {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        /* Atmospheric Drift */
        @keyframes drift {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -20px) scale(1.1); }
            66% { transform: translate(-20px, 40px) scale(0.9); }
        }

        .pulse-ring {
            animation: biometric-pulse 4s infinite ease-in-out;
        }

        .scanning-ring {
            border: 1px dashed rgba(118, 214, 213, 0.4);
            animation: rotate-ring 15s linear infinite;
        }

        .scan-line-v2 {
            animation: scan-sweep 3s infinite ease-in-out;
        }

        .entrance-fade {
            animation: float-up 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            opacity: 0;
        }

        .shimmer-effect::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.2), transparent);
            transform: skewX(-25deg);
        }

        .hover-shimmer:hover::after {
            animation: button-shimmer 0.75s infinite;
        }

        .silk-bg {
            background: radial-gradient(circle at top right, #1a1f2f, #0e1322);
            overflow: hidden;
            position: relative;
        }

        .emerald-leak {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(5, 231, 119, 0.12) 0%, transparent 70%);
            border-radius: 50%;
            animation: drift 25s infinite ease-in-out;
        }

        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.2s; }
        .delay-3 { animation-delay: 0.3s; }
        .delay-4 { animation-delay: 0.4s; }

        @media (prefers-reduced-motion: reduce) {
            .entrance-fade, .pulse-ring, .scanning-ring, .scan-line-v2, .emerald-leak, .hover-shimmer:hover::after {
                animation: none !important;
                opacity: 1 !important;
                transform: none !important;
            }
        }
    </style>

<!-- Interactive script for feedback -->
<script>
        const bioTrigger = document.getElementById('biometric-trigger');
        const scanLine = bioTrigger.querySelector('.scan-line-v2');
        const aura = bioTrigger.querySelector('.pulse-ring');
        
        bioTrigger.addEventListener('click', () => {
            // Speed up animations for feedback
            scanLine.style.animationDuration = '0.8s';
            aura.style.animationDuration = '1s';
            aura.style.opacity = '1';
            
            setTimeout(() => {
                scanLine.style.animationDuration = '3s';
                aura.style.animationDuration = '4s';
                aura.style.opacity = '0.6';
            }, 2000);
        });

        // Background movement effect (subtle parallax)
        document.body.addEventListener('mousemove', (e) => {
            if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
            
            const x = (e.clientX / window.innerWidth - 0.5) * 60;
            const y = (e.clientY / window.innerHeight - 0.5) * 60;
            document.querySelectorAll('.emerald-leak').forEach(leak => {
                leak.style.transform = `translate(${x}px, ${y}px)`;
            });
        });
    </script>
